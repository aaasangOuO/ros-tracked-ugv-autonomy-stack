local_costmap:
  global_frame: map #在局部代价地图中的全局坐标系，一般需要设置为odom_frame?
  robot_base_frame: base_footprint #机器人本体的基坐标系 (base_link?)
  update_frequency: 5.0 #0.3 #before 5.0
  publish_frequency: 2 #before 2.0
  static_map: false #局部代价地图一般不设置为静态地图，因为需要检测是否在机器人附近有新增的动态障碍物
  rolling_window: true #使用滚动窗口，始终保持机器人在当前局部地图的中心位置
  width: 2.5 #代价地图（滚动窗口）的宽度，单位米
  height: 2.5 #代价地图（滚动窗口）的高度，单位米
  resolution: 0.05 #increase to for higher res 0.025 #0.05 代价地图（滚动窗口）的分辨率
  #注意，这里的分辨率可以不同于所建地图的分辨率，但一般情况下该参数的值与所建的地图一致
  transform_tolerance: 0.5
  cost_scaling_factor: 5
#inflation_radius: 0.55
plugins:
    - {name: obstacles_laser,           type: "costmap_2d::ObstacleLayer"}
    - {name: inflation,                 type: "costmap_2d::InflationLayer"}