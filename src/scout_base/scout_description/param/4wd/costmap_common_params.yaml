#确定最大范围传感器读数，这将导致障碍物被放入代价地图中。
#在这里，我们把它设置在1.5米，这意味着机器人只会更新其地图包含距离移动基座1.5米以内的障碍物的信息
obstacle_range: 1.5 #2.5
#确定了用于清除指定范围外的空间。
#将其设置为3.5米，这意味着机器人将尝试清除3米外的空间，在代价地图中清除3米外的障碍物
raytrace_range: 3.5 #3.5
#机器人的轮廓，用于探知机器人是否能穿过某个障碍物
footprint: [[-0.33, -0.33], [-0.33, 0.33], [0.33, 0.33], [0.33, -0.33]]
#膨胀半径应设定为在代价地图的与障碍物保持安全的最大距离。
#inflation_radius控制零成本点距离障碍物有多远，膨胀层会把障碍物的代价膨胀直到该半径为止
#例如，将膨胀半径设定为0.65米，意味着机器人针对相同的障碍物获取的所有路径都保持距离障碍物0.65米或更远。
#如果你的机器人不能很好地通过窄门或其它狭窄的地方，则稍微减小这个值，相反地，如果机器人不断地撞到东西，则尝试增大这个值。
inflation_radius: 0.3 #0.3
#坐标系间的转换可以忍受的最大延时，计算机计算资源有限时，可调大
transform_tolerance: 0.13 #0.13

#定义一系列传递空间信息给代价地图的传感器。如下是scan，指激光雷达
# observation_sources: scan
# scan: #观察源之一：激光数据。定义了：观察源的数据类型，发布话题，标记和添加障碍物
#   data_type: LaserSfdafcan #观察源的数据类型：激光扫描
#   marking: true #启用标记障碍物功能
#   clearing: true #启用清除障碍物功能
#   inf_is_valid: true

map_type: costmap

